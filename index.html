<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Elegance | Bespoke Botanical Design</title>
    
    <!-- Premium Editorial & Sans Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Organic, editorial tone palette */
            --bg-canvas: #f7f5f0;       /* Warm linen background */
            --ink: #111518;            /* Deep velvet black for dramatic text contrast */
            --accent-rose: #d44d61;    /* The high-conversion "pop" color for sales actions */
            --muted-clay: #8a817c;     /* Soft earth tone for secondary elements */
            --white: #ffffff;
            
            --font-editorial: 'Cormorant Garamond', serif;
            --font-clean: 'Inter', sans-serif;
            --transition-fluid: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--ink);
            font-family: var(--font-clean);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 1. ASYMMETRICAL EDITORIAL HEADER & HERO SPLIT */
        .editorial-hero {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            min-height: 90vh;
            width: 100%;
            position: relative;
        }

        /* Text Side */
        .hero-statement {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 10% 4rem 12%;
            background-color: var(--bg-canvas);
        }

        .hero-statement .brand-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--muted-clay);
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .hero-statement h1 {
            font-family: var(--font-editorial);
            font-size: 4.5rem;
            font-weight: 400;
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }

        .hero-statement h1 em {
            font-style: italic;
            color: var(--accent-rose);
        }

        .hero-statement p {
            font-size: 1rem;
            color: var(--muted-clay);
            max-width: 420px;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        /* High-Converting Floating Action Link */
        .editorial-cta {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: var(--ink);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            transition: var(--transition-fluid);
        }

        .editorial-cta .circle-arrow {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: var(--transition-fluid);
        }

        .editorial-cta:hover {
            color: var(--accent-rose);
        }

        .editorial-cta:hover .circle-arrow {
            background: var(--accent-rose);
            border-color: var(--accent-rose);
            color: var(--white);
            transform: translateX(8px);
        }

        /* Main Image Side (Hero Visual Component) */
        .hero-visual-frame {
            position: relative;
            background-color: #e2ded5;
            overflow: hidden;
        }

        .hero-visual-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 2. THE ANTI-GRID EDITORIAL GALLERY (High Converting Sales Showcase) */
        .showcase-container {
            padding: 8rem 8% 10rem 8%;
            max-width: 1500px;
            margin: 0 auto;
        }

        .showcase-intro {
            margin-bottom: 6rem;
            max-width: 600px;
        }

        .showcase-intro h2 {
            font-family: var(--font-editorial);
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        /* Asymmetrical stagger track */
        .asymmetric-track {
            display: flex;
            flex-direction: column;
            gap: 12rem; /* Extreme spacing prevents it from looking like a standard list */
        }

        /* Row Base Styling */
        .editorial-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        /* Flip alternating items to destroy template uniformity */
        .editorial-row.alternate {
            flex-direction: row-reverse;
        }

        /* Large Image Card Setup */
        .art-card {
            width: 55%;
            position: relative;
        }

        .art-img-wrapper {
            width: 100%;
            height: 650px; /* Tall, premium proportions */
            overflow: hidden;
            background-color: #eae6dd;
        }

        .art-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-fluid);
        }

        .art-card:hover .art-img-wrapper img {
            transform: scale(1.03);
        }

        /* Floating Overlaid Product Panel for High Conversion Context */
        .sales-panel {
            width: 38%;
            padding: 2rem 0;
        }

        .editorial-row.alternate .sales-panel {
            padding-right: 5%;
        }

        .sales-panel .item-index {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-rose);
            margin-bottom: 1rem;
            display: block;
        }

        .sales-panel h3 {
            font-family: var(--font-editorial);
            font-size: 2.4rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .sales-panel .price-tag {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 1.5rem;
            font-family: var(--font-editorial);
            font-style: italic;
        }

        .sales-panel p {
            font-size: 0.95rem;
            color: var(--muted-clay);
            margin-bottom: 2.5rem;
            font-weight: 300;
            max-width: 360px;
        }

        /* Luxury Immediate Buy Button */
        .purchase-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
            padding: 1.2rem 1.5rem;
            background: var(--ink);
            color: var(--white);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            transition: var(--transition-fluid);
        }

        .purchase-trigger:hover {
            background: var(--accent-rose);
            padding-left: 2rem;
            padding-right: 1rem;
        }

        /* Responsive Adaptive Adjustments */
        @media (max-width: 992px) {
            .editorial-hero { grid-template-columns: 1fr; }
            .hero-visual-frame { height: 50vh; }
            .editorial-row, .editorial-row.alternate { flex-direction: column; align-items: flex-start; gap: 2.5rem; }
            .art-card, .sales-panel { width: 100%; }
            .art-img-wrapper { height: 450px; }
            .asymmetric-track { gap: 6rem; }
        }
    </style>
</head>
<body>

    <!-- 1. EDITORIAL STATEMENT HERO SECTION -->
    <header class="editorial-hero">
        <div class="hero-statement">
            <span class="brand-tag">Bespoke Parker Florist</span>
            <h1>Living art arranged for <em>extraordinary</em> moments.</h1>
            <p>Moving past standard commercial bouquets. We craft expressive, organic structural designs delivered fresh across Colorado.</p>
            
            <a href="#collection" class="editorial-cta">
                <span>Explore Pieces</span>
                <div class="circle-arrow">↓</div>
            </a>
        </div>
        
        <!-- Hero Spotlight using your first image -->
        <div class="hero-visual-frame">
            <img src="flower2.jpg" alt="Exquisite Floral Gallery Arrangement Focus">
        </div>
    </header>

    <!-- 2. STAGGERED ASYMMETRIC E-COMMERCE SHOWCASE -->
    <main class="showcase-container" id="collection">
        <div class="showcase-intro">
            <h2 id="sales-anchor">The Seasonal Release</h2>
            <p style="color: var(--muted-clay); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;">Click any item to view custom delivery dates.</p>
        </div>

        <div class="asymmetric-track">
            
            <!-- PRODUCT FEATURE 1 (Using flower1.jpg) -->
            <div class="editorial-row">
                <div class="art-card">
                    <div class="art-img-wrapper">
                        <img src="flower1.jpg" alt="The Crimson Botanical Sculpture">
                    </div>
                </div>
