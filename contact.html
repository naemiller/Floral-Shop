<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Floral Elegance</title>
    
    <!-- Premium Editorial & Sans Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Clean Organic Palette */
            --bg-canvas: #f7f5f0;       /* Warm linen background */
            --ink: #111518;            /* Velvet black text contrast */
            --accent-rose: #d44d61;    /* Accent color for hover states */
            --muted-clay: #8a817c;     /* Soft earth tone for subtitles */
            --white: #ffffff;
            --border-light: rgba(17, 21, 24, 0.1);
            
            --font-editorial: 'Cormorant Garamond', serif;
            --font-clean: 'Inter', sans-serif;
            --transition-fluid: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--ink);
            font-family: var(--font-clean);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-top: 80px; /* Space for fixed header */
        }

        /* NAVIGATION BAR */
        .site-navigation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: rgba(247, 245, 240, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            z-index: 1000;
            border-bottom: 1px solid rgba(17, 21, 24, 0.05);
        }

        .nav-logo {
            font-family: var(--font-editorial);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .nav-link-item {
            text-decoration: none;
            color: var(--muted-clay);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: var(--transition-fluid);
        }

        .nav-link-item:hover, .nav-link-item.active {
            color: var(--ink);
        }

        /* 2-COLUMN LAYOUT */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            min-height: calc(100vh - 80px);
            max-width: 100%;
        }

        /* Left Side: Store Info Panel */
        .contact-editorial-panel {
            padding: 5rem 10% 5rem 12%;
            background-color: var(--bg-canvas);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-title {
            font-family: var(--font-editorial);
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .contact-title em {
            font-style: italic;
        }

        .contact-subtitle {
            font-size: 1rem;
            font-weight: 300;
            color: var(--muted-clay);
            margin-bottom: 3rem;
            max-width: 420px;
        }

        .contact-direct-info {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .info-group h3 {
            font-family: var(--font-editorial);
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .info-group p {
            font-size: 0.95rem;
            color: var(--muted-clay);
            font-weight: 300;
        }

        .info-group a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-fluid);
        }

        .info-group a:hover {
            color: var(--accent-rose);
        }

        /* Right Side: Clean Form Panel */
        .contact-form-panel {
            background-color: var(--white);
            padding: 5rem 12% 5rem 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .inquiry-form {
            width: 100%;
            max-width: 550px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .form-input, .form-textarea {
            font-family: var(--font-clean);
            font-size: 1rem;
            font-weight: 300;
            padding: 0.75rem 0;
            color: var(--ink);
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--border-light);
            outline: none;
            transition: var(--transition-fluid);
            width: 100%;
        }

        .form-input:focus, .form-textarea:focus {
            border-bottom-color: var(--ink);
        }

        .form-textarea {
            resize: none;
            height: 100px;
        }

        /* Button Styling */
        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ink);
            color: var(--white);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-fluid);
            width: 100%;
        }

        .btn-submit:hover {
            background-color: var(--accent-rose);
        }

        /* RESPONSIVE DESIGN BREAKPOINTS */
        @media (max-width: 992px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-editorial-panel {
                padding: 4rem 10%;
            }
            .contact-subtitle {
                margin-bottom: 2rem;
            }
            .contact-direct-info {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 3rem;
            }
            .contact-form-panel {
                padding: 4rem 10%;
            }
        }

        @media (max-width: 600px) {
            .site-navigation {
                padding: 0 5%;
            }
            .nav-links {
                display: none; /* Desktop menu hidden on small mobile sizes */
            }
            .contact-direct-info {
                flex-direction: column;
                gap: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="site-navigation">
        <a href="#" class="nav-logo">Floral Elegance</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link-item">Home</a>
            <a href="gallery.html" class="nav-link-item">Gallery</a>
            <a href="contact.html" class="nav-link-item active">Contact</a>
        </div>
    </nav>

    <!-- CONTENT WRAPPER -->
    <div class="contact-container">
        
        <!-- Left Column: Business Details -->
        <aside class="contact-editorial-panel">
            <div>
                <h1 class="contact-title">Visit our <em>flower shop</em>.</h1>
                <p class="contact-subtitle">Stop by to browse fresh bouquets, or drop us a quick line below to check flower availability today.</p>
            </div>
            
            <div class="contact-direct-info">
                <div class="info-group">
                    <h3>The Shop</h3>
                    <p>123 Botanist Way<br>Denver, CO 80245</p>
                </div>
                <div class="info-group">
                    <h3>Get in Touch</h3>
                    <p><a href="mailto:support@floralelegance.com">support@floralelegance.com</a></p>
                    <p><a href="tel:+11234567890">+1 (123) 456-7890</a></p>
                </div>
            </div>
        </aside>

        <!-- Right Column: Simplified Basic Form -->
        <main class="contact-form-panel">
            <form class="inquiry-form" action="#" method="POST">
                
                <div class="form-group">
                    <label class="form-label" for="fullName">Your Name</label>
                    <input class="form-input" type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="subject">Subject</label>
                    <input class="form-input" type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
